<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAY AI – Boka konsultation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 480px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 650px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-info h2 { font-size: 17px; font-weight: 600; }
        .header-info p { font-size: 13px; opacity: 0.8; margin-top: 2px; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fa;
        }

        .message {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .message.user { flex-direction: row-reverse; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }

        .user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .bot-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 12px;
            background: #f8f9fa;
        }

        .option-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
        }

        .input-area {
            display: flex;
            padding: 16px;
            gap: 10px;
            background: white;
            border-top: 1px solid #eee;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #667eea; }

        button.send {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        button.send:hover { transform: scale(1.05); }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">🎯</div>
            <div class="header-info">
                <h2>JAY AI – Kostnadsfri konsultation</h2>
                <p>Svarar direkt · 3 minuter</p>
            </div>
        </div>

        <div class="messages" id="messages"></div>
        <div class="options" id="options"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Skriv här..." 
                onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const systemPrompt = `Du är en professionell säljkvalificerare för JAY AI, ett företag som säljer AI-agenttjänster till svenska småföretag. 

Ditt mål är att kvalificera leads genom att ställa dessa frågor i ordning:
1. Vad heter företaget och vad gör ni?
2. Hur många anställda har ni?
3. Vilket av dessa problem känner ni igen er i: (a) Ni missar kundförfrågningar utanför kontorstid, (b) Ni lägger för mycket tid på administrativa uppgifter, (c) Ni vill ha mer leads och bokningar automatiskt, (d) Ni vill synas bättre på Google
4. Hur hanterar ni detta idag?
5. Vad är er e-postadress så vi kan boka ett kostnadsfritt möte?

Regler:
- Ställ EN fråga i taget
- Håll svaren korta och vänliga
- När du fått mailadressen, tacka och säg att någon från JAY AI hör av sig inom 24 timmar
- Svara alltid på svenska
- Var professionell men personlig`;

        const messages = [];

        async function addBotMessage(text) {
            const messagesDiv = document.getElementById('messages');
            
            messagesDiv.innerHTML += `
                <div class="message bot" id="typing">
                    <div class="bot-icon">🎯</div>
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            await new Promise(r => setTimeout(r, 1000));
            
            document.getElementById('typing')?.remove();
            
            messagesDiv.innerHTML += `
                <div class="message bot">
                    <div class="bot-icon">🎯</div>
                    <div class="bubble">${text}</div>
                </div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage(text) {
            const input = document.getElementById('input');
            const messagesDiv = document.getElementById('messages');
            const message = text || input.value.trim();
            if (!message) return;

            document.getElementById('options').innerHTML = '';
            
            messagesDiv.innerHTML += `
                <div class="message user">
                    <div class="bubble">${message}</div>
                </div>`;
            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            messages.push({ role: 'user', content: message });

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message,
                    history: messages,
                    system: systemPrompt
                })
            });

            const data = await response.json();
            const reply = data.reply;
            
            messages.push({ role: 'assistant', content: reply });
            await addBotMessage(reply);

            // Visa svarsalternativ för fråga 3
            if (reply.includes('(a)') || reply.includes('problem')) {
                document.getElementById('options').innerHTML = `
                    <button class="option-btn" onclick="sendMessage('Vi missar kundförfrågningar utanför kontorstid')">📞 Missar förfrågningar</button>
                    <button class="option-btn" onclick="sendMessage('Vi lägger för mycket tid på administration')">📄 För mycket admin</button>
                    <button class="option-btn" onclick="sendMessage('Vi vill ha fler leads automatiskt')">🎯 Fler leads</button>
                    <button class="option-btn" onclick="sendMessage('Vi vill synas bättre på Google')">🔍 Bättre SEO</button>
                `;
            }
        }

        // Starta konversationen
        window.onload = async () => {
            await addBotMessage('Hej! 👋 Jag heter Alex och hjälper dig ta reda på om JAY AI passar för ditt företag. Det tar bara 3 minuter. Vad heter ditt företag och vad gör ni?');
        };
    </script>
</body>
</html>
