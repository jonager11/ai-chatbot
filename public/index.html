<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kundtjänst</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 400px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #2563eb; color: white; padding: 20px; font-size: 18px; font-weight: bold; }
        .chat-messages { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 80%; }
        .user { background: #2563eb; color: white; align-self: flex-end; }
        .bot { background: #f0f2f5; color: #333; align-self: flex-start; }
        .chat-input { display: flex; padding: 16px; gap: 8px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; }
        button { padding: 12px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">💬 Kundtjänst</div>
        <div class="chat-messages" id="messages">
            <div class="message bot">Hej! Hur kan jag hjälpa dig idag?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="Skriv ett meddelande..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Skicka</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("input");
            const messages = document.getElementById("messages");
            const message = input.value.trim();
            if (!message) return;

            messages.innerHTML += `<div class="message user">${message}</div>`;
            input.value = "";
            messages.scrollTop = messages.scrollHeight;

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            messages.innerHTML += `<div class="message bot">${data.reply}</div>`;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
