<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAY AI – SEO-innehållsskapare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header h1 { font-size: 22px; font-weight: 700; }
        .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }

        .form-section {
            padding: 36px;
            border-bottom: 1px solid #eee;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #444;
        }

        input, select, textarea {
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
        }

        textarea { resize: vertical; min-height: 80px; }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .output-section {
            padding: 36px;
            display: none;
        }

        .output-section.visible { display: block; }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .output-header h2 { font-size: 18px; color: #333; }

        .copy-btn {
            padding: 8px 20px;
            background: #f0f2f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            transition: background 0.2s;
        }

        .copy-btn:hover { background: #e0e3e8; }

        .output-content {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 28px;
            line-height: 1.8;
            color: #333;
            font-size: 15px;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.visible { display: block; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #eee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p { color: #666; font-size: 15px; }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
        }

        .stat {
            background: #f0f2f5;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">✍️</div>
            <div>
                <h1>JAY AI – SEO-innehållsskapare</h1>
                <p>Generera professionellt SEO-innehåll på svenska på sekunder</p>
            </div>
        </div>

        <div class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label>Ämne / Nyckelord *</label>
                    <input type="text" id="topic" placeholder="t.ex. tandblekning hemma">
                </div>
                <div class="form-group">
                    <label>Innehållstyp</label>
                    <select id="contentType">
                        <option value="blogginlägg">Blogginlägg</option>
                        <option value="produktbeskrivning">Produktbeskrivning</option>
                        <option value="landningssida">Landningssida</option>
                        <option value="FAQ">FAQ-sida</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bransch</label>
                    <input type="text" id="industry" placeholder="t.ex. tandvård, e-handel">
                </div>
                <div class="form-group">
                    <label>Ton</label>
                    <select id="tone">
                        <option value="professionell">Professionell</option>
                        <option value="vänlig och personlig">Vänlig & personlig</option>
                        <option value="teknisk och detaljerad">Teknisk</option>
                        <option value="enkel och lättläst">Enkel & lättläst</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Målgrupp (valfritt)</label>
                    <textarea id="audience" placeholder="t.ex. Svenska småföretagare som vill automatisera sin verksamhet"></textarea>
                </div>
            </div>
            <button class="generate-btn" onclick="generateContent()">✨ Generera SEO-innehåll</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Genererar SEO-optimerat innehåll på svenska...</p>
        </div>

        <div class="output-section" id="output">
            <div class="output-header">
                <h2>Genererat innehåll</h2>
                <button class="copy-btn" onclick="copyContent()">📋 Kopiera</button>
            </div>
            <div class="output-content" id="content"></div>
            <div class="stats" id="stats"></div>
        </div>
    </div>

    <script>
        async function generateContent() {
            const topic = document.getElementById('topic').value.trim();
            if (!topic) { alert('Ange ett ämne eller nyckelord!'); return; }

            const contentType = document.getElementById('contentType').value;
            const industry = document.getElementById('industry').value;
            const tone = document.getElementById('tone').value;
            const audience = document.getElementById('audience').value;

            document.getElementById('loading').classList.add('visible');
            document.getElementById('output').classList.remove('visible');
            document.querySelector('.generate-btn').disabled = true;

            const prompt = `Skriv ett SEO-optimerat ${contentType} på svenska om: "${topic}"
            
${industry ? `Bransch: ${industry}` : ''}
${audience ? `Målgrupp: ${audience}` : ''}
Ton: ${tone}

Krav:
- Skriv på korrekt, professionell svenska
- Inkludera en SEO-optimerad rubrik (H1)
- Inkludera 3-5 underrubriker (H2)
- Naturlig användning av nyckelord
- Avsluta med en tydlig call-to-action
- Längd: 400-600 ord`;

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: prompt,
                    system: 'Du är en expert på SEO och innehållsskrivning för svenska företag. Du skriver alltid på korrekt, flytande svenska och optimerar innehåll för svenska söktermer.'
                })
            });

            const data = await response.json();
            
            document.getElementById('loading').classList.remove('visible');
            document.getElementById('output').classList.add('visible');
            document.getElementById('content').textContent = data.reply;
            document.querySelector('.generate-btn').disabled = false;

            const wordCount = data.reply.split(' ').length;
            document.getElementById('stats').innerHTML = `
                <div class="stat">📝 ${wordCount} ord</div>
                <div class="stat">⏱️ ~${Math.ceil(wordCount/200)} min läsning</div>
                <div class="stat">🎯 Optimerad för: ${topic}</div>
            `;
        }

        function copyContent() {
            const content = document.getElementById('content').textContent;
            navigator.clipboard.writeText(content);
            document.querySelector('.copy-btn').textContent = '✅ Kopierad!';
            setTimeout(() => document.querySelector('.copy-btn').textContent = '📋 Kopiera', 2000);
        }
    </script>
</body>
</html>
